<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Password Reset</title>
</head>
<body style="margin:0; padding:0; font-family: Arial, sans-serif; background-color:#f4f4f4;">
  
  <table width="100%" cellspacing="0" cellpadding="0" bgcolor="#f4f4f4">
    <tr>
      <td align="center">
        
        <table width="500" cellspacing="0" cellpadding="0" bgcolor="#ffffff" style="margin-top:30px; border-radius:10px; overflow:hidden;">
          
          <!-- Header -->
          <tr>
            <td align="center" bgcolor="#4CAF50" style="padding:20px; color:white; font-size:22px;">
              🔐 Password Reset
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:30px; color:#333;">
              <h2>Hello 👋,</h2>
              <p>You requested to reset your password.</p>

              <p>Your OTP is:</p>

              <h1 style="text-align:center; letter-spacing:5px; color:#4CAF50;">
                {{OTP}}
              </h1>

              <p style="text-align:center;">This OTP is valid for 5 minutes.</p>

              <p>If you didn’t request this, please ignore this email.</p>

              <br>

              <p>Thanks,<br><b>Your Company Team</b></p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" bgcolor="#f1f1f1" style="padding:15px; font-size:12px; color:#777;">
              © 2026 Your Company. All rights reserved.
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
